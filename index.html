<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achmad Maulana Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f172a,#1d4ed8,#06b6d4,#7c3aed);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#loading{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
z-index:9999;
animation:hilang 1s forwards;
animation-delay:3s;
}

@keyframes hilang{
to{
opacity:0;
visibility:hidden;
}
}

.card{
width:90%;
max-width:700px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:40px;
border-radius:30px;
text-align:center;
color:white;
box-shadow:0 0 30px rgba(255,255,255,.3);
z-index:10;
}

h1{
font-size:45px;
margin-bottom:15px;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}

#jam{
font-size:22px;
margin:15px;
}

#typing{
font-size:22px;
min-height:40px;
margin:20px 0;
color:#fff;
}

button{
padding:14px 30px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.btn1{
background:#22c55e;
color:white;
}

.btn2{
background:#ef4444;
color:white;
}

.btn3{
background:#f59e0b;
color:white;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100vh);
}
to{
transform:translateY(100vh);
}
}

.emoji{
position:absolute;
font-size:30px;
animation:emojiFall linear infinite;
}

@keyframes emojiFall{
from{
transform:translateY(-100vh);
}
to{
transform:translateY(100vh);
}
}

</style>
</head>
<body>

<div id="loading">
🚀 Memuat Website...
</div>

<div class="card">

<h1>✨ Achmad Maulana ✨</h1>

<div id="jam"></div>

<div id="typing"></div>

<button class="btn1" onclick="welcome()">
🎉 Klik Saya
</button>

<button class="btn2" onclick="emojiParty()">
😂 Hujan Emoji
</button>

<button class="btn3" onclick="playMusic()">
🔊 Musik
</button>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

function updateClock(){
let now=new Date();
document.getElementById('jam').innerHTML=
"🕒 "+now.toLocaleTimeString();
}
setInterval(updateClock,1000);

const texts=[
"Selamat Datang di Website Keren 😎",
"Website Animasi Modern 🚀",
"Dibuat Khusus Untuk Achmad Maulana 🔥",
"Semoga Harimu Menyenangkan 🎉"
];

let textIndex=0;
let charIndex=0;

function typeEffect(){

if(charIndex<texts[textIndex].length){

document.getElementById("typing").innerHTML+=
texts[textIndex].charAt(charIndex);

charIndex++;

}else{

setTimeout(()=>{
document.getElementById("typing").innerHTML="";
charIndex=0;
textIndex=(textIndex+1)%texts.length;
},1500);

}

}

setInterval(typeEffect,100);

function welcome(){
alert("🎉 Terima Kasih Sudah Berkunjung!");
}

function playMusic(){
document.getElementById("music").play();
}

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.animationDuration=
(Math.random()*6+3)+"s";

document.body.appendChild(star);

}

function emojiParty(){

const emoji=["😂","🤣","❤️","🔥","🎉","😎","✨"];

for(let i=0;i<80;i++){

let e=document.createElement("div");

e.className="emoji";

e.innerHTML=
emoji[Math.floor(Math.random()*emoji.length)];

e.style.left=Math.random()*100+"vw";

e.style.animationDuration=
(Math.random()*4+2)+"s";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},5000);

}

}

</script>

</body>
</html>
